<h2>配色主題</h2>
<p class="subtitle">選擇基礎色調 + 強調色組合</p>

<div class="options">
  <div class="option" data-choice="light" onclick="toggleSelect(this)">
    <div class="letter">1</div>
    <div class="content">
      <h3>淺色主題</h3>
      <p>米白底色 + 藍紫強調色，柔和專業</p>
    </div>
  </div>
  <div class="option" data-choice="dark" onclick="toggleSelect(this)">
    <div class="letter">2</div>
    <div class="content">
      <h3>深色主題</h3>
      <p>深灰底色 + 靛藍強調色，沈穩內斂</p>
    </div>
  </div>
  <div class="option" data-choice="red" onclick="toggleSelect(this)">
    <div class="letter">3</div>
    <div class="content">
      <h3>熱情紅</h3>
      <p>深色底 + 玫瑰紅強調色，強烈個性</p>
    </div>
  </div>
  <div class="option" data-choice="blue" onclick="toggleSelect(this)">
    <div class="letter">4</div>
    <div class="content">
      <h3>靜謐藍</h3>
      <p>中性底 + 天藍強調色，清新理智</p>
    </div>
  </div>
  <div class="option" data-choice="green" onclick="toggleSelect(this)">
    <div class="letter">5</div>
    <div class="content">
      <h3>自然綠</h3>
      <p>深色底 + 薄荷綠強調色，活潑清新</p>
    </div>
  </div>
  <div class="option" data-choice="purple" onclick="toggleSelect(this)">
    <div class="letter">6</div>
    <div class="content">
      <h3>神秘紫</h3>
      <p>暗色底 + 薰衣草紫強調色，夢幻高級</p>
    </div>
  </div>
</div>
